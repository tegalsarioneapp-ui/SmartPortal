[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npx --yes pnpm@8.15.9 install --no-frozen-lockfile --ignore-scripts"
]

[phases.build]
cmds = [
  "npx pnpm@8.15.9 --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
