[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@8.15.9 && pnpm install --no-frozen-lockfile --ignore-scripts"
]

[phases.build]
cmds = [
  "npm run -g pnpm -- --filter @workspace/api-server run build || $(npm root -g)/.bin/pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
