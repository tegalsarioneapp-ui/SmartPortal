[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd artifacts/api-server && npm install --legacy-peer-deps --ignore-scripts"
]

[phases.build]
cmds = [
  "cd artifacts/api-server && node ./build.mjs"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
